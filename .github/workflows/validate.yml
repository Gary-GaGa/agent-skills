name: validate

on:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "**/INDEX.md"
      - "**/references/**"
      - "rules/**"
      - "evals/**"
      - "skills.json"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SKILL_TEMPLATE.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"
      - ".github/copilot-instructions.md"
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills repo
        run: python3 scripts/validate.py

      - name: Routing eval (informational; diffs against evals/baseline.json)
        # Does NOT fail the build — eval regressions are signals to investigate,
        # not auto-fail. Compare the printed numbers against the baseline lines.
        run: python3 scripts/run_routing_eval.py --baseline evals/baseline.json
        continue-on-error: true
