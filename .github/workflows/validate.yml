name: validate

on:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "**/INDEX.md"
      - "rules/**"
      - "skills.json"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SKILL_TEMPLATE.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"
      - ".github/copilot-instructions.md"
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills repo
        run: python3 scripts/validate.py
